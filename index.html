<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下级统计表 - 可编辑版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e94560;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #e94560;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            letter-spacing: 2px;
        }
        .subtitle {
            text-align: center;
            color: #a0a0a0;
            margin-bottom: 40px;
            font-size: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
        }
        .stat-label {
            color: #a0a0a0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .stat-value {
            color: #e94560;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
        }
        .table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        input[type="text"], input[type="number"] {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            padding: 12px 20px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.3);
        }
        input[type="text"]::placeholder, input[type="number"]::placeholder {
            color: #666;
        }
        .account-input {
            flex: 2;
            min-width: 200px;
        }
        .number-input {
            flex: 1;
            min-width: 150px;
        }
        button {
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-delete {
            background: linear-gradient(135deg, #ff4757 0%, #cc3744 100%);
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        thead {
            background: rgba(233, 69, 96, 0.2);
        }
        th {
            color: #e94560;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        tr:hover {
            background: rgba(233, 69, 96, 0.1);
        }
        .rank {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            background: rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            color: #e94560;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .rank.top {
            background: #e94560;
            color: white;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .btn-clear {
            background: transparent;
            border: 2px solid #e94560;
            color: #e94560;
        }
        .btn-clear:hover {
            background: rgba(233, 69, 96, 0.1);
        }

        /* 可编辑样式 */
        .editable-cell {
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }
        .editable-cell:hover {
            color: #ff6b6b;
        }
        .editable-cell::after {
            content: '✎';
            margin-left: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .editable-cell:hover::after {
            opacity: 1;
        }
        .edit-input {
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            border-radius: 6px;
            padding: 5px 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            width: 100px;
            text-align: center;
            outline: none;
        }
        .account-name-cell {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .account-name-cell:hover {
            color: #ff6b6b;
        }
        .account-name-cell::after {
            content: '✎';
            margin-left: 8px;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .account-name-cell:hover::after {
            opacity: 1;
        }
        .name-input {
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            border-radius: 6px;
            padding: 5px 10px;
            color: #fff;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .updating {
            animation: pulse 0.3s ease;
            color: #ffd700;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <h1>下级统计表</h1>
        <p class="subtitle">点击数字或账户名可直接修改</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总账户数</div>
                <div class="stat-value" id="totalAccounts">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">下级总数</div>
                <div class="stat-value" id="totalSubordinates">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">平均下级数</div>
                <div class="stat-value" id="avgSubordinates">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最高下级数</div>
                <div class="stat-value" id="maxSubordinates">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="controls">
                <input type="text" class="account-input" id="accountInput" placeholder="输入账户名称..." onkeypress="handleEnter(event)">
                <input type="number" class="number-input" id="numberInput" placeholder="下级数量" min="0" onkeypress="handleEnter(event)">
                <button onclick="addAccount()">添加账户</button>
            </div>

            <table id="statsTable">
                <thead>
                    <tr>
                        <th style="width: 80px;">排名</th>
                        <th>账户名称 (点击编辑)</th>
                        <th style="width: 150px;">下级数量 (点击编辑)</th>
                        <th style="width: 200px;">占比</th>
                        <th style="width: 100px;">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-state">
                        <td colspan="5">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <p>暂无数据，请添加账户</p>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="action-buttons">
                <button class="btn-clear" onclick="clearAll()">清空全部</button>
            </div>
        </div>
    </div>

    <script>
        let accounts = [];
        let editingId = null;
        let editingField = null;

        function handleEnter(event) {
            if (event.key === 'Enter') {
                addAccount();
            }
        }

        function addAccount() {
            const accountInput = document.getElementById('accountInput');
            const numberInput = document.getElementById('numberInput');

            const accountName = accountInput.value.trim();
            const subordinateCount = parseInt(numberInput.value) || 0;

            if (!accountName) {
                accountInput.style.borderColor = '#ff4757';
                setTimeout(() => {
                    accountInput.style.borderColor = 'rgba(233, 69, 96, 0.3)';
                }, 1000);
                return;
            }

            accounts.push({
                name: accountName,
                count: subordinateCount,
                id: Date.now()
            });

            accountInput.value = '';
            numberInput.value = '';
            accountInput.focus();

            updateDisplay();
        }

        function deleteAccount(id) {
            accounts = accounts.filter(acc => acc.id !== id);
            updateDisplay();
        }

        function clearAll() {
            if (accounts.length === 0) return;
            if (confirm('确定要清空所有数据吗？')) {
                accounts = [];
                updateDisplay();
            }
        }

        // 开始编辑下级数量
        function startEditCount(id, currentValue) {
            if (editingId !== null) {
                saveEdit();
            }

            editingId = id;
            editingField = 'count';

            const cell = document.getElementById(`count-${id}`);
            cell.innerHTML = `<input type="number" class="edit-input" id="edit-input-${id}" value="${currentValue}" min="0" onblur="saveEdit()" onkeypress="handleEditEnter(event)">`;

            const input = document.getElementById(`edit-input-${id}`);
            input.focus();
            input.select();
        }

        // 开始编辑账户名
        function startEditName(id, currentValue) {
            if (editingId !== null) {
                saveEdit();
            }

            editingId = id;
            editingField = 'name';

            const cell = document.getElementById(`name-${id}`);
            cell.innerHTML = `<input type="text" class="name-input" id="edit-input-${id}" value="${escapeHtml(currentValue)}" onblur="saveEdit()" onkeypress="handleEditEnter(event)">`;

            const input = document.getElementById(`edit-input-${id}`);
            input.focus();
            input.select();
        }

        function handleEditEnter(event) {
            if (event.key === 'Enter') {
                saveEdit();
            }
        }

        function saveEdit() {
            if (editingId === null) return;

            const input = document.getElementById(`edit-input-${editingId}`);
            if (!input) return;

            const newValue = input.value.trim();
            const account = accounts.find(acc => acc.id === editingId);

            if (account) {
                if (editingField === 'count') {
                    const numValue = parseInt(newValue) || 0;
                    if (numValue !== account.count) {
                        account.count = numValue;
                        // 添加更新动画效果
                        const row = document.getElementById(`row-${editingId}`);
                        if (row) {
                            row.classList.add('updating');
                            setTimeout(() => row.classList.remove('updating'), 300);
                        }
                    }
                } else if (editingField === 'name') {
                    if (newValue && newValue !== account.name) {
                        account.name = newValue;
                    }
                }
            }

            editingId = null;
            editingField = null;
            updateDisplay();
        }

        function updateDisplay() {
            // 排序：按下级数量降序
            accounts.sort((a, b) => b.count - a.count);

            // 更新统计数据
            const totalAccounts = accounts.length;
            const totalSubordinates = accounts.reduce((sum, acc) => sum + acc.count, 0);
            const avgSubordinates = totalAccounts > 0 ? (totalSubordinates / totalAccounts).toFixed(1) : 0;
            const maxSubordinates = accounts.length > 0 ? Math.max(...accounts.map(acc => acc.count)) : 0;

            // 动画更新数字
            animateNumber('totalAccounts', totalAccounts);
            animateNumber('totalSubordinates', totalSubordinates);
            animateNumber('avgSubordinates', avgSubordinates);
            animateNumber('maxSubordinates', maxSubordinates);

            // 更新表格
            const tbody = document.getElementById('tableBody');

            if (accounts.length === 0) {
                tbody.innerHTML = `
                    <tr class="empty-state">
                        <td colspan="5">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <p>暂无数据，请添加账户</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = accounts.map((acc, index) => {
                const percentage = totalSubordinates > 0 ? ((acc.count / totalSubordinates) * 100).toFixed(1) : 0;
                const maxPercent = maxSubordinates > 0 ? ((acc.count / maxSubordinates) * 100) : 0;

                // 如果正在编辑这一行，保持编辑状态
                if (editingId === acc.id) {
                    if (editingField === 'count') {
                        return `
                            <tr id="row-${acc.id}">
                                <td><span class="rank ${index < 3 ? 'top' : ''}">${index + 1}</span></td>
                                <td id="name-${acc.id}" class="account-name-cell" onclick="startEditName(${acc.id}, '${escapeHtml(acc.name)}')">${escapeHtml(acc.name)}</td>
                                <td><input type="number" class="edit-input" id="edit-input-${acc.id}" value="${acc.count}" min="0" onblur="saveEdit()" onkeypress="handleEditEnter(event)"></td>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <span style="min-width: 45px; font-size: 0.9rem;">${percentage}%</span>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width: ${maxPercent}%"></div>
                                        </div>
                                    </div>
                                </td>
                                <td><button class="btn-delete" onclick="deleteAccount(${acc.id})">删除</button></td>
                            </tr>
                        `;
                    } else {
                        return `
                            <tr id="row-${acc.id}">
                                <td><span class="rank ${index < 3 ? 'top' : ''}">${index + 1}</span></td>
                                <td><input type="text" class="name-input" id="edit-input-${acc.id}" value="${escapeHtml(acc.name)}" onblur="saveEdit()" onkeypress="handleEditEnter(event)"></td>
                                <td id="count-${acc.id}" class="editable-cell" style="font-weight: bold; color: #e94560;" onclick="startEditCount(${acc.id}, ${acc.count})">${acc.count}</td>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 10px;">
                                        <span style="min-width: 45px; font-size: 0.9rem;">${percentage}%</span>
                                        <div class="progress-bar">
                                            <div class="progress-fill" style="width: ${maxPercent}%"></div>
                                        </div>
                                    </div>
                                </td>
                                <td><button class="btn-delete" onclick="deleteAccount(${acc.id})">删除</button></td>
                            </tr>
                        `;
                    }
                }

                return `
                    <tr id="row-${acc.id}" class="fade-in">
                        <td><span class="rank ${index < 3 ? 'top' : ''}">${index + 1}</span></td>
                        <td id="name-${acc.id}" class="account-name-cell" onclick="startEditName(${acc.id}, '${escapeHtml(acc.name)}')">${escapeHtml(acc.name)}</td>
                        <td id="count-${acc.id}" class="editable-cell" style="font-weight: bold; color: #e94560;" onclick="startEditCount(${acc.id}, ${acc.count})">${acc.count}</td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <span style="min-width: 45px; font-size: 0.9rem;">${percentage}%</span>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${maxPercent}%"></div>
                                </div>
                            </div>
                        </td>
                        <td><button class="btn-delete" onclick="deleteAccount(${acc.id})">删除</button></td>
                    </tr>
                `;
            }).join('');
        }

        function animateNumber(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const startValue = parseFloat(element.textContent) || 0;
            const duration = 500;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);

                const current = startValue + (targetValue - startValue) * easeProgress;

                if (targetValue % 1 === 0) {
                    element.textContent = Math.round(current);
                } else {
                    element.textContent = current.toFixed(1);
                }

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 点击外部取消编辑
        document.addEventListener('click', function(e) {
            if (editingId !== null && !e.target.closest('td')) {
                saveEdit();
            }
        });

        // 初始化
        document.getElementById('accountInput').focus();
    </script>
</body>
</html>
