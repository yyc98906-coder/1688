<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS 统计表 - R1 R2 R3 数据管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        
        .row-enter {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.8);
        }
        
        .save-indicator {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Account name display styles */
        .account-display {
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        
        .account-display:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .account-display:hover::after {
            content: ' ✏️';
            opacity: 0.6;
            font-size: 0.8em;
        }
    </style>
<base target="_blank">
</head>
<body class="text-slate-200 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 mb-2">
                RS 统计表
            </h1>
            <p class="text-slate-400">R1 · R2 · R3 数据统计 · 自动保存 · 一键导出</p>
        </div>

        <!-- Stats Overview - 只统计 R1 R2 R3 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="stat-card rounded-xl p-4 border-l-4 border-emerald-500">
                <div class="text-slate-400 text-sm mb-1">R1 总量</div>
                <div class="text-3xl font-bold text-emerald-400" id="totalR1">0</div>
            </div>
            <div class="stat-card rounded-xl p-4 border-l-4 border-purple-500">
                <div class="text-slate-400 text-sm mb-1">R2 总量</div>
                <div class="text-3xl font-bold text-purple-400" id="totalR2">0</div>
            </div>
            <div class="stat-card rounded-xl p-4 border-l-4 border-amber-500">
                <div class="text-slate-400 text-sm mb-1">R3 总量</div>
                <div class="text-3xl font-bold text-amber-400" id="totalR3">0</div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="glass-panel rounded-xl p-4 mb-6 flex flex-wrap gap-3 items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="openAddModal()" class="btn-primary px-6 py-2.5 rounded-lg font-medium text-white flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    添加账户
                </button>
                <button onclick="downloadData()" class="btn-success px-6 py-2.5 rounded-lg font-medium text-white flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    一键下载
                </button>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 text-sm text-slate-400">
                    <span class="save-indicator w-2 h-2 rounded-full bg-emerald-500"></span>
                    <span id="saveStatus">自动保存已开启</span>
                </div>
                <button onclick="clearAll()" class="btn-danger px-4 py-2 rounded-lg text-sm font-medium text-white">
                    清空数据
                </button>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-panel rounded-xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="bg-slate-800/50 border-b border-slate-700">
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-300 w-16">序号</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-300">账户名称</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-emerald-400">R1</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-purple-400">R2</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-amber-400">R3</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold text-slate-300">合计</th>
                            <th class="px-6 py-4 text-center text-sm font-semibold text-slate-300 w-24">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700/50">
                        <!-- Rows will be inserted here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="py-16 text-center text-slate-500">
                <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                </svg>
                <p>暂无数据，点击"添加账户"开始录入 R1 R2 R3 数据</p>
            </div>
        </div>

        <!-- Footer Info -->
        <div class="mt-6 text-center text-sm text-slate-500">
            <p>数据自动保存至浏览器本地存储 · 支持 CSV 格式导出 · 点击账户名称可编辑</p>
        </div>
    </div>

    <!-- Add Account Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="glass-panel rounded-2xl p-6 w-full max-w-md mx-4 transform transition-all scale-100">
            <h3 class="text-xl font-bold mb-4 text-white">添加新账户</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">账户名称</label>
                    <input type="text" id="newAccountName" placeholder="输入账户名称" 
                           class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-slate-600">
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-sm text-emerald-400 mb-1">R1 数量</label>
                        <input type="number" id="newR1" placeholder="0" min="0"
                               class="input-field w-full px-3 py-3 rounded-lg text-emerald-400 font-mono text-center placeholder-slate-600">
                    </div>
                    <div>
                        <label class="block text-sm text-purple-400 mb-1">R2 数量</label>
                        <input type="number" id="newR2" placeholder="0" min="0"
                               class="input-field w-full px-3 py-3 rounded-lg text-purple-400 font-mono text-center placeholder-slate-600">
                    </div>
                    <div>
                        <label class="block text-sm text-amber-400 mb-1">R3 数量</label>
                        <input type="number" id="newR3" placeholder="0" min="0"
                               class="input-field w-full px-3 py-3 rounded-lg text-amber-400 font-mono text-center placeholder-slate-600">
                    </div>
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="closeAddModal()" class="flex-1 px-4 py-3 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 transition-colors">
                    取消
                </button>
                <button onclick="confirmAdd()" class="flex-1 btn-primary px-4 py-3 rounded-lg text-white font-medium">
                    确认添加
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data Management
        let data = [];
        const STORAGE_KEY = 'rs_statistics_data_v3';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderTable();
            updateStats();
            
            // Enter key to submit modal
            document.getElementById('addModal').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    confirmAdd();
                }
            });
        });

        // Load data from localStorage
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    data = JSON.parse(saved);
                } catch (e) {
                    data = [];
                }
            }
        }

        // Save data to localStorage (Auto-save)
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateSaveIndicator();
        }

        // Update save indicator animation
        function updateSaveIndicator() {
            const indicator = document.querySelector('.save-indicator');
            const status = document.getElementById('saveStatus');
            
            indicator.classList.remove('bg-emerald-500');
            indicator.classList.add('bg-blue-500');
            status.textContent = '保存中...';
            
            setTimeout(() => {
                indicator.classList.remove('bg-blue-500');
                indicator.classList.add('bg-emerald-500');
                status.textContent = '已自动保存';
            }, 500);
        }

        // Modal Functions
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModal').classList.add('flex');
            document.getElementById('newAccountName').focus();
            
            // Clear inputs
            document.getElementById('newAccountName').value = '';
            document.getElementById('newR1').value = '';
            document.getElementById('newR2').value = '';
            document.getElementById('newR3').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addModal').classList.remove('flex');
        }

        function confirmAdd() {
            const account = document.getElementById('newAccountName').value.trim();
            const r1 = document.getElementById('newR1').value;
            const r2 = document.getElementById('newR2').value;
            const r3 = document.getElementById('newR3').value;
            
            if (!account) {
                alert('请输入账户名称');
                return;
            }
            
            const newRow = {
                id: Date.now(),
                account: account,
                r1: r1 || '',
                r2: r2 || '',
                r3: r3 || ''
            };
            
            data.push(newRow);
            saveData();
            renderTable();
            updateStats();
            closeAddModal();
        }

        // Delete row
        function deleteRow(id) {
            if (confirm('确定要删除这条记录吗？')) {
                data = data.filter(item => item.id !== id);
                saveData();
                renderTable();
                updateStats();
            }
        }

        // Clear all data
        function clearAll() {
            if (data.length === 0) return;
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                data = [];
                saveData();
                renderTable();
                updateStats();
            }
        }

        // Update field value
        function updateValue(id, field, value) {
            const item = data.find(d => d.id === id);
            if (item) {
                item[field] = value;
                saveData();
                updateStats();
                updateRowTotal(id);
            }
        }

        // Update single row total display
        function updateRowTotal(id) {
            const item = data.find(d => d.id === id);
            if (item) {
                const total = (parseInt(item.r1) || 0) + (parseInt(item.r2) || 0) + (parseInt(item.r3) || 0);
                const totalCell = document.getElementById(`total-${id}`);
                if (totalCell) {
                    totalCell.textContent = total;
                }
            }
        }

        // Enable editing account name inline
        function editAccountName(id, element) {
            const item = data.find(d => d.id === id);
            if (!item) return;
            
            const currentValue = item.account;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentValue;
            input.className = 'input-field w-full px-3 py-2 rounded-lg text-white bg-slate-800/80';
            
            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
            input.select();
            
            function save() {
                const newValue = input.value.trim();
                if (newValue) {
                    item.account = newValue;
                    saveData();
                }
                renderTable();
            }
            
            input.addEventListener('blur', save);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    save();
                } else if (e.key === 'Escape') {
                    renderTable();
                }
            });
        }

        // Calculate and update statistics
        function updateStats() {
            const totalR1 = data.reduce((sum, item) => sum + (parseInt(item.r1) || 0), 0);
            const totalR2 = data.reduce((sum, item) => sum + (parseInt(item.r2) || 0), 0);
            const totalR3 = data.reduce((sum, item) => sum + (parseInt(item.r3) || 0), 0);

            document.getElementById('totalR1').textContent = totalR1.toLocaleString();
            document.getElementById('totalR2').textContent = totalR2.toLocaleString();
            document.getElementById('totalR3').textContent = totalR3.toLocaleString();
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = data.map((item, index) => {
                const total = (parseInt(item.r1) || 0) + (parseInt(item.r2) || 0) + (parseInt(item.r3) || 0);
                return `
                    <tr class="row-enter hover:bg-slate-800/30 transition-colors">
                        <td class="px-6 py-4 text-slate-400 font-mono">${index + 1}</td>
                        <td class="px-6 py-4">
                            <div class="account-display font-medium text-white text-lg" 
                                 onclick="editAccountName(${item.id}, this)">
                                ${item.account || '未命名'}
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <input type="number" 
                                   value="${item.r1}" 
                                   placeholder="0"
                                   min="0"
                                   class="input-field w-24 px-3 py-2 rounded-lg text-emerald-400 font-mono text-center placeholder-slate-600"
                                   oninput="updateValue(${item.id}, 'r1', this.value)">
                        </td>
                        <td class="px-6 py-4">
                            <input type="number" 
                                   value="${item.r2}" 
                                   placeholder="0"
                                   min="0"
                                   class="input-field w-24 px-3 py-2 rounded-lg text-purple-400 font-mono text-center placeholder-slate-600"
                                   oninput="updateValue(${item.id}, 'r2', this.value)">
                        </td>
                        <td class="px-6 py-4">
                            <input type="number" 
                                   value="${item.r3}" 
                                   placeholder="0"
                                   min="0"
                                   class="input-field w-24 px-3 py-2 rounded-lg text-amber-400 font-mono text-center placeholder-slate-600"
                                   oninput="updateValue(${item.id}, 'r3', this.value)">
                        </td>
                        <td class="px-6 py-4">
                            <span id="total-${item.id}" class="font-bold text-white font-mono text-lg">${total}</span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="deleteRow(${item.id})" 
                                    class="p-2 hover:bg-red-500/20 rounded-lg text-slate-400 hover:text-red-400 transition-colors"
                                    title="删除">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Download data as CSV
        function downloadData() {
            if (data.length === 0) {
                alert('没有数据可导出');
                return;
            }

            let csv = '序号,账户名称,R1,R2,R3,合计\n';
            
            data.forEach((item, index) => {
                const total = (parseInt(item.r1) || 0) + (parseInt(item.r2) || 0) + (parseInt(item.r3) || 0);
                csv += `${index + 1},${item.account || ''},${item.r1 || 0},${item.r2 || 0},${item.r3 || 0},${total}\n`;
            });

            const totalR1 = data.reduce((sum, item) => sum + (parseInt(item.r1) || 0), 0);
            const totalR2 = data.reduce((sum, item) => sum + (parseInt(item.r2) || 0), 0);
            const totalR3 = data.reduce((sum, item) => sum + (parseInt(item.r3) || 0), 0);
            const grandTotal = totalR1 + totalR2 + totalR3;
            
            csv += `\n总计,,${totalR1},${totalR2},${totalR3},${grandTotal}\n`;

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
            
            link.href = URL.createObjectURL(blob);
            link.download = `RS统计表_${timestamp}.csv`;
            link.style.display = 'none';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            const btn = document.querySelector('.btn-success');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                下载成功
            `;
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                if (document.getElementById('addModal').classList.contains('hidden')) {
                    openAddModal();
                }
            }
            if (e.key === 'Escape') {
                closeAddModal();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                downloadData();
            }
        });

        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('addModal')) {
                closeAddModal();
            }
        });
    </script>
</body>
</html>
